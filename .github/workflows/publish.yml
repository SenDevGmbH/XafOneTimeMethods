name: Publish to NuGet

on:
  workflow_dispatch:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-publish:
    uses: SenDev/github-workflows/.github/workflows/publish.yml@main
    with:
      solution-path: ./src/SenDev.Xaf.OneTimeMethods.slnx
      test-project-path: ./src/SenDev.Xaf.OneTimeMethods.Tests/SenDev.Xaf.OneTimeMethods.Tests.csproj
      package-name-pattern: SenDev.Xaf.OneTimeMethods.Xpo
    secrets: inherit
